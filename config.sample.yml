server:
  host: "127.0.0.1"
  port: 3399
  heartbeat:
    enable: false
    path: "/health"
  timeouts:
    write: 15s
    read: 15s
    idle: 60s
    timeout: 15s

logger:
  preset: "prod" # варианты: prod, dev
  level: "info" # варианты: debug, info, warn, error

encoder:
  file_pattern: '\.([^.]{8})\.' # регулярное выражение для фильтрации файлов
  paths: # начальные пути директорий для обработки
    - "/_astro"
    - "/css"
  prefer_encoder: "dcz" # предпочитаемый формат, если клиент поддерживает оба: dcz или dcb
  zstd_compression_level: 2 # 1 - fastest, 2 - default, 3 - better compression, 4 - best compression
  brotli_compression_level: 6 # 2-11; для статики попробуйте 9-11, если latency компрессии допустима

storage:
  type: "local" # варианты: local, s3
  local:
    directory_path: "./storage"
  s3:
    bucket: ""
    region: ""
    endpoint: ""
    prefix: ""
    access_token: ""
    secret_token: ""

cache:
  type: "memory" # варианты: memory, redis
  size: 1024

origin:
  url: "http://127.0.0.1:8080"
